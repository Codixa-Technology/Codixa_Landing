<table
  role="presentation"
  cellpadding="0"
  cellspacing="0"
  border="0"
  width="100%"
  style="background-color: #000000; margin: 0; padding: 32px 12px"
>
  <tr>
    <td align="center">
      <table
        role="presentation"
        cellpadding="0"
        cellspacing="0"
        border="0"
        width="600"
        style="
          width: 600px;
          max-width: 100%;
          background-color: #131313;
          border: 1px solid #262626;
          border-radius: 24px;
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica,
            Arial, sans-serif;
        "
      >
        <tr>
          <td style="padding: 40px 40px 0">
            <img
              src="cid:logo.png"
              alt="Codixa"
              height="24"
              style="height: 24px; display: block; border: 0; outline: none"
            />
            <p
              style="
                margin: 28px 0 8px;
                font-size: 12px;
                line-height: 16px;
                letter-spacing: 0.6px;
                text-transform: uppercase;
                color: #ff4d00;
              "
            >
              New enquiry
            </p>
            <h1
              style="
                margin: 0;
                font-size: 26px;
                line-height: 32px;
                font-weight: 600;
                letter-spacing: -0.4px;
                color: #ffffff;
              "
            >
              {{name}} wants to talk.
            </h1>
          </td>
        </tr>

        <tr>
          <td style="padding: 28px 40px 0">
            <table
              role="presentation"
              cellpadding="0"
              cellspacing="0"
              border="0"
              width="100%"
              style="background-color: #0c0c0c; border: 1px solid #262626; border-radius: 16px"
            >
              <tr>
                <td style="padding: 20px 24px; border-bottom: 1px solid #262626">
                  <p
                    style="
                      margin: 0 0 4px;
                      font-size: 11px;
                      letter-spacing: 0.5px;
                      text-transform: uppercase;
                      color: rgba(255, 255, 255, 0.4);
                    "
                  >
                    Name
                  </p>
                  <p style="margin: 0; font-size: 15px; line-height: 22px; color: #ffffff">
                    {{name}}
                  </p>
                </td>
              </tr>
              <tr>
                <td style="padding: 20px 24px; border-bottom: 1px solid #262626">
                  <p
                    style="
                      margin: 0 0 4px;
                      font-size: 11px;
                      letter-spacing: 0.5px;
                      text-transform: uppercase;
                      color: rgba(255, 255, 255, 0.4);
                    "
                  >
                    Email
                  </p>
                  <p style="margin: 0; font-size: 15px; line-height: 22px">
                    <a href="mailto:{{email}}" style="color: #ff4d00; text-decoration: none"
                      >{{email}}</a
                    >
                  </p>
                </td>
              </tr>
              <tr>
                <td style="padding: 20px 24px">
                  <p
                    style="
                      margin: 0 0 4px;
                      font-size: 11px;
                      letter-spacing: 0.5px;
                      text-transform: uppercase;
                      color: rgba(255, 255, 255, 0.4);
                    "
                  >
                    Project description
                  </p>
                  <p
                    style="
                      margin: 0;
                      font-size: 15px;
                      line-height: 24px;
                      color: rgba(255, 255, 255, 0.8);
                      white-space: pre-wrap;
                    "
                  >
                    {{message}}
                  </p>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <tr>
          <td style="padding: 28px 40px 40px">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td align="center" bgcolor="#ff4d00" style="border-radius: 50px">
                  <a
                    href="mailto:{{email}}"
                    style="
                      display: inline-block;
                      padding: 12px 32px;
                      font-size: 14px;
                      line-height: 20px;
                      font-weight: 600;
                      color: #ffffff;
                      text-decoration: none;
                      border-radius: 50px;
                    "
                    >Reply to {{name}}</a
                  >
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
